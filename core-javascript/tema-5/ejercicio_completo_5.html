<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios JavaScript</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            color: #4CAF50;
            font-size: 3rem;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2rem;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 2px solid #4CAF50;
            display: inline-block;
            font-size: 1.5rem;
            color: #333;
            min-height: 100px;
            width: 300px;
        }
    </style>
</head>
<body>
    <h1>Ejercicios 5 Completo</h1>
    <div>
        <button onclick="fibonacci()">Serie Fibonacci</button>
        <button onclick="mostrarSaludo()">Saludar</button>
        <button onclick="convertirTemperatura()">Convertir Temperatura</button>
        <button onclick="validarEmail()">Validar Email</button>
        <button onclick="contarDigitos()">Contar Dígitos</button>
        <button onclick="validarDni()">Validar DNI</button>
        <button onclick="longitudUltimaPalabra()">Última Palabra</button>
        <button onclick="titulo()">Convertir a Título</button>
        <button onclick="calcularAreaCirculo()">Área de Círculo</button>
        <button onclick="calcularAreaRectTri()">Área Rectángulo/Triángulo</button>
        <button onclick="cambiarVocal()">Cambiar Vocal</button>
        <button onclick="calcularPrecioConIVA()">Precio con IVA</button>
        <button onclick="textoReves()">Texto al Revés</button>
    </div>

    <div id="output"></div>

    <script src="ejercicio_completo_5.js"></script>
</body>
</html>
