<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Multiples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        #result {
            margin-top: 20px;
            font-size: 1.2em;
            color: green;
        }
    </style>
</head>
<body>
    <h1>Generate Multiples of a Number</h1>

    <!-- Add placeholders and default values for guidance -->
    <label for="size">Array Size:</label>
    <input type="number" id="size" value="4" placeholder="Enter array size (e.g., 4)"><br>

    <label for="number">Number:</label>
    <input type="number" id="number" value="2" placeholder="Enter number (e.g., 2)"><br>

    <!-- Button to generate and show multiples -->
    <button onclick="showMultiples()">Generate Multiples</button>

    <!-- Area to display the result -->
    <p id="result"></p>

    <script>
        // Function to generate multiples in the browser
        function generateMultiples(size, num) {
            const result = [];
            for (let i = 1; i <= size; i++) {
                result.push(num * i);
            }
            return result;
        }

        // Function to display the result
        function showMultiples() {
            const size = parseInt(document.getElementById('size').value);
            const number = parseInt(document.getElementById('number').value);

            // Validate the input
            if (isNaN(size) || isNaN(number) || size <= 0) {
                alert('Please enter valid numbers');
                return;
            }

            // Call the function to generate multiples
            const result = generateMultiples(size, number);

            // Display the result inside the <p> tag
            document.getElementById('result').innerText = `Result: [${result.join(', ')}]`;
        }
    </script>
</body>
</html>
